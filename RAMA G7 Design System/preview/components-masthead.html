<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500;600&family=Sarabun:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {box-sizing:border-box;margin:0;padding:0}
  body {background:#030F27;font-family:'DM Sans','Sarabun',system-ui,sans-serif}
  .masthead {background:#030F27;border-bottom:1px solid rgba(20,181,157,0.3);padding:14px 28px}
  .inner {max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:24px}
  .mark {display:flex;align-items:center;gap:10px;text-decoration:none}
  .mark img {height:30px;width:auto;opacity:0.9}
  .wordmark {font-family:'Space Grotesk',system-ui,sans-serif;font-weight:700;font-size:1.25rem;letter-spacing:0.06em;text-transform:uppercase;display:flex;align-items:baseline;gap:3px;line-height:1;margin-top:2px}
  .wordmark-rama {color:#F4EFE6}
  .wordmark-g7 {color:#14B59D}
  .tagline {font-size:0.68rem;letter-spacing:0.05em;color:#9AA0AB;font-weight:400;white-space:nowrap}
  nav {display:flex;gap:28px;align-items:center}
  nav a {font-size:0.78rem;font-weight:500;letter-spacing:0.04em;color:#F4EFE6;text-decoration:none;opacity:0.6;transition:opacity 120ms}
  nav a.active {opacity:1;color:#14B59D}
  nav a:hover {opacity:1}
</style></head><body>
<div class="masthead">
  <div class="inner">
    <div style="display:flex;align-items:center;gap:16px">
      <a href="#" class="mark">
        <img src="../assets/logo.png" alt="">
        <div class="wordmark">
          <span class="wordmark-rama">RAMA</span><span class="wordmark-g7">G7</span>
        </div>
      </a>
      <span class="tagline">medical innovators @ Ramathibodi</span>
    </div>
    <nav>
      <a href="#" class="active">Editorial</a>
      <a href="#">About</a>
      <a href="#">Join</a>
    </nav>
  </div>
</div>
</body></html>
