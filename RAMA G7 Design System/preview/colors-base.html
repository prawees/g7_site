<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#F4EFE6;font-family:'IBM Plex Sans',system-ui,sans-serif;padding:20px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .swatch{border-radius:3px;overflow:hidden;border:1px solid rgba(3,15,39,0.08)}
  .swatch-color{height:64px}
  .swatch-info{padding:8px 10px;background:#fff}
  .swatch-name{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#5C6675;margin-bottom:2px}
  .swatch-hex{font-size:12px;font-weight:600;color:#030F27;font-family:monospace}
  .swatch-label{font-size:10px;color:#9AA0AB;margin-top:2px}
</style></head><body>
<div class="grid">
  <div class="swatch"><div class="swatch-color" style="background:#030F27"></div><div class="swatch-info"><div class="swatch-name">Ink</div><div class="swatch-hex">#030F27</div><div class="swatch-label">--color-ink</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#F4EFE6;border-bottom:1px solid #DCD4C2"></div><div class="swatch-info"><div class="swatch-name">Paper</div><div class="swatch-hex">#F4EFE6</div><div class="swatch-label">--color-paper</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#EDE6D6"></div><div class="swatch-info"><div class="swatch-name">Paper Warm</div><div class="swatch-hex">#EDE6D6</div><div class="swatch-label">--color-paper-warm</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#14B59D"></div><div class="swatch-info"><div class="swatch-name">Accent</div><div class="swatch-hex">#14B59D</div><div class="swatch-label">--color-accent</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#0E8A78"></div><div class="swatch-info"><div class="swatch-name">Accent Deep</div><div class="swatch-hex">#0E8A78</div><div class="swatch-label">--color-accent-deep</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#DCD4C2"></div><div class="swatch-info"><div class="swatch-name">Rule</div><div class="swatch-hex">#DCD4C2</div><div class="swatch-label">--color-rule</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#5C6675"></div><div class="swatch-info"><div class="swatch-name">Muted</div><div class="swatch-hex">#5C6675</div><div class="swatch-label">--color-muted</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#9AA0AB"></div><div class="swatch-info"><div class="swatch-name">Muted Soft</div><div class="swatch-hex">#9AA0AB</div><div class="swatch-label">--color-muted-soft</div></div></div>
  <div class="swatch"><div class="swatch-color" style="background:#FFFFFF;border-bottom:1px solid #DCD4C2"></div><div class="swatch-info"><div class="swatch-name">White</div><div class="swatch-hex">#FFFFFF</div><div class="swatch-label">--color-white</div></div></div>
</div>
</body></html>
