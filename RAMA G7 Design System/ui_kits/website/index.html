const useScrollReaction = () => {
  const [reaction, setReaction] = React.useState({ tilt: 0, smile: 0 });
  React.useEffect(() => {
    let lastY = window.scrollY;
    let tid;
    const onScroll = () => {
      const dy = window.scrollY - lastY;
      lastY = window.scrollY;
      const tilt = Math.max(-20, Math.min(20, dy * 1.8));
      const smile = dy > 3 ? 1 : dy < -3 ? -1 : 0;
      setReaction({ tilt, smile });
      clearTimeout(tid);
      tid = setTimeout(() => setReaction({ tilt: 0, smile: 0 }), 700);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => { window.removeEventListener('scroll', onScroll); clearTimeout(tid); };
  }, []);
  return reaction;
};

      }}>{label}</span>
    </a>
  );
};

            radial-gradient(1.5px 1.5px at 83% 9%, rgba(255,255,255,0.75) 0%, transparent 100%),
            radial-gradient(1px 1px at 58% 28%, rgba(255,255,255,0.6) 0%, transparent 100%),
            radial-gradient(1px 1px at 29% 46%, rgba(255,255,255,0.35) 0%, transparent 100%),

          <section className="hero-text fade-up">

// ── App Shell ──────────────────────────────────────────────────────
const App = () => {
  const [page, setPage] = React.useState("editorial");
  const [article, setArticle] = React.useState(null);

  const handleNav = (p) => {
    setPage(p);
    setArticle(null);
    window.scrollTo({ top: 0 });
  };

  const handleArticle = (post) => {
    setArticle(post);
    setPage("article");
    window.scrollTo({ top: 0 });
  };

  const activePage = article ? "editorial" : page;

  return (
    <div>
      <Masthead activePage={activePage} onNav={handleNav} hideWordmark={activePage === "editorial" && !article} />
      {page === "editorial" && !article && <EditorialIndex onArticle={handleArticle} />}
      {page === "article" && article && <ArticleView post={article} onBack={() => handleNav("editorial")} />}
      {page === "about" && <AboutPage />}
      {page === "join" && <JoinPage />}
      <Footer />
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
