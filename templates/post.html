<div class="article-wrap">
  <div class="article">
    <a class="article-back" href="/">← บทความทั้งหมด</a>
  </div>

  <div class="article-banner">
    <div class="article-banner-grad"></div>
    <div class="article-banner-fade"></div>
  </div>

  <article class="article">
    <header class="article-header fade-up">
      <div class="article-meta">
        <span>{{date_label}}</span>
        <span class="dot">·</span>
        <span>{{category}}</span>
        <span class="dot">·</span>
        <span>{{reading_time}} min read</span>
      </div>
      <h1 class="article-title">{{title}}</h1>
      <p class="article-lede">{{lede}}</p>
      <p class="article-byline">By <span class="author-name">{{author}}</span>, RAMA G7</p>
    </header>

    <div class="article-body fade-up">
      {{body}}
    </div>

    {{references_block}}
  </article>
</div>
