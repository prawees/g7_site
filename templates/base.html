<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{description}}">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>{{title}}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=Space+Grotesk:wght@600;700&family=IBM+Plex+Mono&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/static/css/style.css?v={{build_time}}">
  <link rel="icon" href="/static/img/favicon.png?v={{build_time}}">

  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:type" content="{{og_type}}">
  <meta property="og:site_name" content="RAMA G7 Club">
</head>
<body>

<header class="masthead">
  <div class="masthead-inner">
    <div class="masthead-left">
      <a href="/" class="masthead-mark" aria-label="RAMA G7 Club home">
        <img src="/static/img/logo.png" alt="">
        <span class="masthead-wordmark"><span>RAMA</span><span class="accent">G7</span></span>
      </a>
      <span class="masthead-tagline">medical innovators @ Ramathibodi</span>
    </div>
    <nav class="masthead-nav">
      <a href="/?v={{build_time}}" class="{{nav_home}}">Editorial</a>
      <a href="/about/?v={{build_time}}" class="{{nav_about}}">About</a>
      <a href="/join/?v={{build_time}}" class="{{nav_join}}">Join</a>
    </nav>
  </div>
</header>

<main>
  {{content}}
</main>

<footer>
  <div class="footer-inner">
    <div>
      <h4>RAMA G7 Club | ชมรมแพทย์นวัตกรรามาธิบดี</h4>
      <p class="footer-desc">สำหรับนศพ.ที่สนใจสร้างนวัตกรรมทางการแพทย์<br>คณะแพทยศาสตร์โรงพยาบาลรามาธิบดี<br>มหาวิทยาลัยมหิดล</p>
    </div>
    <div>
      <h4>ติดต่อ</h4>
      <a href="https://facebook.com/rama.g7.club" target="_blank" rel="noopener">Facebook</a>
      <a href="https://instagram.com/rama.g7.club" target="_blank" rel="noopener">Instagram</a>
      <a href="mailto:rama.g7.club@gmail.com">Email the editors</a>
    </div>
  </div>
  <div class="footer-meta">
    © {{year}} RAMA G7 Club
  </div>
</footer>

</body>
</html>
