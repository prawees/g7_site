<section class="hero">
  <div class="hero-stars" aria-hidden="true"></div>
  <div class="hero-inner">
    <div class="hero-text fade-up">
      <div class="hero-wordmark">RAMA <span class="accent">G7</span></div>
      <h1 class="hero-headline">แหล่งรวมตัวแพทย์นวัตกร</h1>
      <p class="hero-desc">
        พื้นที่แบ่งปันความคิดของนักศึกษาแพทย์รามาธิบดี<br />
        ที่หลงใหลในเทคโนโลยีและกล้าที่จะตั้งคำถาม<br />
        <span class="accent"
          >เพื่อเปลี่ยนความสงสัย ให้เป็นนวัตกรรมที่เปลี่ยนชีวิตคนได้จริง</span
        >
      </p>
    </div>
  </div>
</section>

<div class="index-wrap">
  <div
    class="section-rule fade-up"
    style="display: flex; flex-direction: column"
  >
    <div>
      <span class="label">กิจกรรมของเรา</span>
    </div>
    <div class="container">{{activities}}</div>
  </div>

  <div class="section-rule fade-up" style="margin-top: 24px">
    <span class="label">บทความล่าสุด</span>
    <span class="line"></span>
  </div>
  <div class="post-list fade-up">
    {{post_cards}}
    <div class="post-list-end"></div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const robots = document.querySelectorAll('.hero-robot');
    if (!robots.length) return;

    const SPEED = 0.6;
    const states = new Map();

    robots.forEach((robot, index) => {
      document.body.appendChild(robot);
      robot.style.position = 'fixed';
      robot.style.zIndex = '50';
      robot.style.cursor = 'grab';

      const angle = Math.random() * Math.PI * 2;
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 140);

      robot.style.left = x + 'px';
      robot.style.top = y + 'px';

      states.set(robot, {
        x,
        y,
        vx: Math.cos(angle) * SPEED,
        vy: Math.sin(angle) * SPEED,
        time: index * 1000,
        dragging: false,
        dragOffX: 0,
        dragOffY: 0,
        trail: [], // last N pointer positions for release velocity
        dragMoved: false,
      });
    });

    function setSquish(robot, on) {
      robot
        .querySelectorAll('.robot-eyes')
        .forEach((g) =>
          g.setAttribute('visibility', on ? 'hidden' : 'visible'),
        );
      robot
        .querySelectorAll('.robot-eyes-squish')
        .forEach((g) =>
          g.setAttribute('visibility', on ? 'visible' : 'hidden'),
        );
      robot.style.cursor = on ? 'grabbing' : 'grab';
    }

    function pointerDown(robot, clientX, clientY) {
      const s = states.get(robot);
      s.dragging = true;
      s.dragMoved = false;
      s.dragOffX = clientX - s.x;
      s.dragOffY = clientY - s.y;
      s.trail = [{ x: clientX, y: clientY, t: performance.now() }];
      setSquish(robot, true);
    }

    function pointerMove(clientX, clientY) {
      robots.forEach((robot) => {
        const s = states.get(robot);
        if (!s.dragging) return;
        s.dragMoved = true;
        s.x = clientX - s.dragOffX;
        s.y = clientY - s.dragOffY;
        robot.style.left = s.x + 'px';
        robot.style.top = s.y + 'px';
        s.trail.push({ x: clientX, y: clientY, t: performance.now() });
        if (s.trail.length > 8) s.trail.shift();
      });
    }

    function pointerUp() {
      robots.forEach((robot) => {
        const s = states.get(robot);
        if (!s.dragging) return;
        s.dragging = false;
        setSquish(robot, false);
        // Compute release velocity from recent trail
        if (s.trail.length >= 2) {
          const a = s.trail[0],
            b = s.trail[s.trail.length - 1];
          const dt = b.t - a.t || 16;
          const scale = 16 / dt; // normalise to ~60fps frame
          s.vx = (b.x - a.x) * scale;
          s.vy = (b.y - a.y) * scale;
          // Cap speed so it doesn't fly off screen
          const mag = Math.sqrt(s.vx * s.vx + s.vy * s.vy);
          const maxSpd = 6;
          if (mag > maxSpd) {
            s.vx = (s.vx / mag) * maxSpd;
            s.vy = (s.vy / mag) * maxSpd;
          }
          // Keep minimum glide — very slow so user can read behind it
          const MIN = 0.03;
          if (mag < MIN) {
            const a = Math.random() * Math.PI * 2;
            s.vx = Math.cos(a) * MIN;
            s.vy = Math.sin(a) * MIN;
          }
        }
      });
    }

    // Mouse events
    robots.forEach((robot) => {
      robot.addEventListener('mousedown', (e) => {
        e.preventDefault();
        pointerDown(robot, e.clientX, e.clientY);
      });
      robot.addEventListener('click', (e) => {
        if (states.get(robot).dragMoved) e.preventDefault();
      });
      robot.addEventListener(
        'touchstart',
        (e) => {
          e.preventDefault();
          pointerDown(robot, e.touches[0].clientX, e.touches[0].clientY);
        },
        { passive: false },
      );
    });
    window.addEventListener('mousemove', (e) =>
      pointerMove(e.clientX, e.clientY),
    );
    window.addEventListener('mouseup', pointerUp);
    window.addEventListener(
      'touchmove',
      (e) => {
        if ([...states.values()].some((s) => s.dragging)) {
          e.preventDefault();
          pointerMove(e.touches[0].clientX, e.touches[0].clientY);
        }
      },
      { passive: false },
    );
    window.addEventListener('touchend', () => {
      robots.forEach((robot) => {
        const s = states.get(robot);
        if (!s.dragging) return;
        const wasTap = !s.dragMoved;
        pointerUp();
        // touchstart preventDefault blocks synthetic click — navigate manually on tap
        if (wasTap) {
          const href = robot.getAttribute('href');
          if (href) window.open(href, '_blank', 'noopener,noreferrer');
        }
      });
    });

    function animate() {
      robots.forEach((robot) => {
        const s = states.get(robot);
        if (s.dragging) return;

        const rect = robot.getBoundingClientRect();
        const w = rect.width,
          h = rect.height;

        s.x += s.vx;
        s.y += s.vy;

        if (s.x <= 0) {
          s.x = 0;
          s.vx *= -1;
        } else if (s.x + w >= window.innerWidth) {
          s.x = window.innerWidth - w;
          s.vx *= -1;
        }
        if (s.y <= 0) {
          s.y = 0;
          s.vy *= -1;
        } else if (s.y + h >= window.innerHeight) {
          s.y = window.innerHeight - h;
          s.vy *= -1;
        }

        s.time += 16;
        const tilt = s.vx * 15;
        const bob = Math.sin(s.time / 400) * 8;

        robot.style.left = s.x + 'px';
        robot.style.top = s.y + 'px';
        robot.style.transform = `rotate(${tilt}deg) translateY(${bob}px)`;
      });
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  });
</script>
